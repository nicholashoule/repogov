# golangci-lint configuration for repogov.
# Run: golangci-lint run ./...
# Install: https://golangci-lint.run/usage/install/
# Requires golangci-lint v2.

version: "2"

linters:
  default: none
  enable:
    - errcheck
    - gocritic
    - godot
    - govet
    - ineffassign
    - misspell
    - revive
    - staticcheck
    - unused
  settings:
    gocritic:
      disabled-checks:
        - commentedOutCode
      enabled-tags:
        - diagnostic
        - performance
    godot:
      scope: toplevel
      capital: false
    misspell:
      locale: US
    revive:
      rules:
        - name: exported
          arguments:
            - checkPrivateReceivers
            - sayRepetitiveInsteadOfStutters
        - name: var-naming
          disabled: false
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - godot
          - revive
        path: _test\.go
      - linters:
          - gocritic
          - godot
          - revive
        path: scripts/hooks/pre-commit\.go
      - linters:
          - godot
          - revive
        path: docs/examples/driver/main\.go
    paths:
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
formatters:
  enable:
    - gofmt
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
